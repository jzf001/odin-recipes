<head>

    <title>酒酿蛋花年糕</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>小方酒酿蛋花年糕</h1><p></p>
    <img src="https://assets.tmecosys.cn/image/upload/t_web_rdp_recipe_584x480/img/recipe/ras/Assets/a6bf58eb-9b66-42aa-ad47-c0c743f4d112/Derivates/a6f19a0b-5914-4001-afa5-fbdaa8c71b2a.jpg" alt="酒酿蛋花年糕的图片" height="400" width="400">
    <p></p>
    <h3>
        准备工作5分钟&nbsp;&nbsp;&nbsp;&nbsp;总数50分钟&nbsp;&nbsp;&nbsp;&nbsp;3人份
    </h3>
    <h2>食材<p></p>
        <h3>
            <pre>水1300克   糖50克  年糕切小丁1*1厘米300克  蛋白打匀3颗  酒酿350克</pre>
        </h3>
    </h2>
    <h2>制作过程</h2>
        <h5>
            <pre>
        1.将水和糖放入主锅，以11 分/120°C/速度煮沸。
        2.加入年糕，以2 分 30 秒/120°C/速度 1烹煮。
        3.加入蛋白，1 分 30 秒/120°C/速度 1加热。
        4.加入酒酿，利用刮刀棒混合均匀，倒入碗内，即可享用。
            </pre>
        </h5>
